name: Update LICENSES (Dependabot)

on:
  push:
    branches:
      - dependabot/**

permissions:
  contents: write

jobs:
  update-licenses:
    name: Regenerate LICENSES file
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Regenerate LICENSES file
        run: make licenses-update

      - name: Commit if changed
        run: |
          if git diff --quiet LICENSES; then
            echo "LICENSES is already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add LICENSES
          git commit -m "chore(deps): updated LICENSES for dependency changes"
          git push
