name: Security

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 23 * * 6'  # Saturday 23:00 UTC (~Sunday midnight CET)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
