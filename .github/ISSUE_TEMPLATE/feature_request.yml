name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please check [existing issues and discussions](https://github.com/mxstzdev/releasar-cli/issues) to see if this has already been proposed.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What are you trying to do that you can't do today, or what friction are you hitting?
      placeholder: "e.g. When releasing a monorepo package I have to manually…"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like releasar to do. Be as specific as you can — config keys, CLI flags, expected output, etc.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about or tried.

  - type: dropdown
    id: scm
    attributes:
      label: SCM provider (if relevant)
      options:
        - GitHub
        - GitLab
        - Gitea
        - Forgejo
        - Not applicable
    validations:
      required: true

  - type: dropdown
    id: project_type
    attributes:
      label: Project layout (if relevant)
      options:
        - Single package (monolith)
        - Monorepo
        - Not applicable
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, prior art in other release tools, or anything else that helps illustrate the request.
