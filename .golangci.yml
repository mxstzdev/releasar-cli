version: "2"

linters:
  default: none
  enable:
    - errcheck       # unhandled errors
    - govet          # suspicious constructs
    - staticcheck    # broad static analysis
    - gofmt          # formatting
    - goimports      # import grouping + formatting
    - exhaustive     # missing switch cases on enums
    - godot          # doc comments end with a period
    - nilerr         # returning nil alongside a non-nil error
    - unparam        # unused function parameters
    - unused         # unused code

linters-settings:
  goimports:
    local-prefixes: github.com/mariusvslprts/releasar-cli
  exhaustive:
    default-signifies-exhaustive: true

issues:
  max-same-issues: 0
